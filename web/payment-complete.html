<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Оплата успешна | Dokki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }
        .icon { font-size: 64px; color: #4CAF50; margin-bottom: 24px; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        p { color: #888; font-size: 15px; line-height: 1.5; }
        .hint { margin-top: 32px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
    <div class="icon">✓</div>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
    <p class="hint" id="hint"></p>

    <script>
        const lang = navigator.language || navigator.userLanguage || 'en';
        const isRu = lang.startsWith('ru');
        const isAr = lang.startsWith('ar');

        if (isRu) {
            document.getElementById('title').textContent = 'Оплата принята!';
            document.getElementById('subtitle').textContent = 'Подписка активирована. Вернитесь в приложение Dokki чтобы завершить настройку бота.';
            document.getElementById('hint').textContent = 'Нажмите ← назад или закройте вкладку';
        } else if (isAr) {
            document.getElementById('title').textContent = 'تم الدفع بنجاح!';
            document.getElementById('subtitle').textContent = 'تم تفعيل الاشتراك. عد إلى تطبيق Dokki لإكمال إعداد البوت.';
            document.getElementById('hint').textContent = 'اضغط ← رجوع أو أغلق التبويب';
            document.body.style.direction = 'rtl';
        } else {
            document.getElementById('title').textContent = 'Payment accepted!';
            document.getElementById('subtitle').textContent = 'Subscription activated. Return to the Dokki app to finish setting up your bot.';
            document.getElementById('hint').textContent = 'Press ← back or close this tab';
        }
    </script>
</body>
</html>
