<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата завершена | Dokki Business</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-icon {
            font-size: 80px;
            color: #4CAF50;
            margin-bottom: 24px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        h1 { font-size: 28px; margin-bottom: 12px; font-weight: 700; }
        p { color: #b0b0b0; font-size: 18px; margin-bottom: 40px; max-width: 340px; line-height: 1.6; padding: 0 20px; }
        .close-btn {
            background-color: #007AFF;
            color: white;
            padding: 18px 44px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 18px;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
            transition: transform 0.2s;
        }
        .close-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="success-icon">✓</div>
    <h1>Оплата принята!</h1>
    <p>Вкладку можно закрыть. Просто вернитесь в приложение Dokki, чтобы завершить настройку бота.</p>
    <button onclick="window.close()" class="close-btn">Вернуться в приложение</button>
    <script>
        // Попытка закрыть окно через 3 секунды автоматически
        setTimeout(() => { window.close(); }, 3000);
    </script>
</body>
</html>
